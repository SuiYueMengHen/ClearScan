name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ vars.RELEASE_SIGNING_CONFIGURED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install NDK and CMake
        run: sdkmanager "ndk;28.2.13676358" "cmake;3.31.6"
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CLEARSCAN_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/clearscan-release.jks"
      - name: Test and build signed APK
        env:
          CLEARSCAN_KEYSTORE_PATH: ${{ runner.temp }}/clearscan-release.jks
          CLEARSCAN_KEYSTORE_PASSWORD: ${{ secrets.CLEARSCAN_KEYSTORE_PASSWORD }}
          CLEARSCAN_KEY_ALIAS: ${{ secrets.CLEARSCAN_KEY_ALIAS }}
          CLEARSCAN_KEY_PASSWORD: ${{ secrets.CLEARSCAN_KEY_PASSWORD }}
        run: ./gradlew testDownloadModelDebugUnitTest lintDownloadModelRelease assembleDownloadModelRelease
      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/downloadModel/release/app-downloadModel-release.apk "ClearScan-${GITHUB_REF_NAME}-arm64-v8a.apk"
          sha256sum "ClearScan-${GITHUB_REF_NAME}-arm64-v8a.apk" > "ClearScan-${GITHUB_REF_NAME}-arm64-v8a.apk.sha256"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "ClearScan-${GITHUB_REF_NAME}-arm64-v8a.apk" "ClearScan-${GITHUB_REF_NAME}-arm64-v8a.apk.sha256" --generate-notes --verify-tag
